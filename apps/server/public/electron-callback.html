<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kracken - Авторизация успешна</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
        }
        p {
            margin: 0;
            opacity: 0.9;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Авторизация успешна!</h1>
        <p>Вы успешно вошли в Kracken через GitHub.</p>
        <p>Это окно закроется автоматически...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Get token from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            // Store token in localStorage for Electron app to pick up
            localStorage.setItem('github_oauth_token', token);
            
            // Show success message for 3 seconds, then close
            setTimeout(() => {
                window.close();
            }, 3000);
        } else {
            // No token found, show error
            document.querySelector('.success-icon').textContent = '❌';
            document.querySelector('h1').textContent = 'Ошибка авторизации';
            document.querySelector('p').textContent = 'Не удалось получить токен авторизации.';
            document.querySelector('.spinner').style.display = 'none';
            
            // Close after 5 seconds
            setTimeout(() => {
                window.close();
            }, 5000);
        }
    </script>
</body>
</html>
